<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS Compiler</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Inter:wght@400;500;600&family=Ubuntu+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">
  <div class="app-container">
    <header class="header">
      <div class="logo">
        <h1>JS Playground</h1>
      </div>
      <div class="actions">
        <button id="theme-toggle" class="btn icon-btn">
          <svg id="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg id="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button id="run-btn" class="btn primary-btn">Run Code</button>
        <button id="clear-btn" class="btn secondary-btn" onclick="document.getElementById('console-output').innerHTML = '';">Clear</button>
      </div>
    </header>
    <main class="main-content">
      <div class="editor-pane pane">
        <div class="pane-header">
          <span class="pane-title">JavaScript</span>
        </div>
        <div id="monaco-editor-container" class="editor-container"></div>
      </div>
      <div class="resizer" id="resizer"></div>
      <div class="console-pane pane">
        <div class="pane-header">
          <span class="pane-title">Console</span>
        </div>
        <div class="console-container" id="console-output"></div>
      </div>
    </main>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
